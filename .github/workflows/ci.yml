name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs for the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      # Check formatting without rewriting files (the `format` script uses --write).
      - run: npx prettier --check .
